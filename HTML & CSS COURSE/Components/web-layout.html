<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
  , initial-scale=1.0"
    />
    <title>layout</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        color: #343a40;
        font-size: 24px;

        display: grid;
        text-align: center;
        grid-template-columns: 80px 240px 1fr 250px;
        grid-template-rows: 80px 1fr;
        height: 100vh;
      }
      nav,
      menu,
      section,
      main,
      aside {
        padding: 24px;
      }
      nav {
        background-color: #343a40;
        grid-row: 1/-1;
        color: #fff;
      }

      menu {
        background-color: #7048e8;
        color: #fff;
        grid-column: 2/5;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      section {
        background-color: #e9ecef;
        display: flex;
        gap: 42px;
        flex-direction: column;
        overflow: scroll;
      }
      .mail {
        background-color: #adb5db;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      aside {
        background-color: #e9ecef;
      }
      button {
        display: inline-block;
        font-size: 16px;
        font-weight: bold;
        padding: 8px 12px;
        color: #fff;
        background-color: #4e20da;
        border: none;
        cursor: pointer;
      }
      button:last-child {
        background-color: rgb(221, 38, 69);
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <nav>Nav</nav>
    <menu>
      <button>New</button>
      <button>Reply</button>
      <button>Forward</button>
      <button>Mark Unread</button>
      <button class="btn">Trash</button>
    </menu>

    <section>
      <div class="mail">Email-1</div>
      <div class="mail">Email-2</div>
      <div class="mail">Email-3</div>
      <div class="mail">Email-4</div>
      <div class="mail">Email-5</div>
      <div class="mail">Email-6</div>

      <div class="mail">Email-7</div>
      <div class="mail">Email-8</div>
    </section>
    <main>Email viewer</main>
    <aside>Additional info</aside>
  </body>
</html>
